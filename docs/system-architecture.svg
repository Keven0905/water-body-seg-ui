<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">基于 U-Net 模型的卫星图像水体识别系统架构图</title>
  <desc id="desc">展示 Vue 前端、Flask 后端、PyTorch U-Net 推理、模型权重管理和结果文件服务之间的数据流。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07141f"/>
      <stop offset="0.56" stop-color="#0b1b2a"/>
      <stop offset="1" stop-color="#102737"/>
    </linearGradient>
    <linearGradient id="frontend" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f7a8c"/>
      <stop offset="1" stop-color="#0f4c5c"/>
    </linearGradient>
    <linearGradient id="backend" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2d6a4f"/>
      <stop offset="1" stop-color="#1b4332"/>
    </linearGradient>
    <linearGradient id="model" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5a4fcf"/>
      <stop offset="1" stop-color="#332c86"/>
    </linearGradient>
    <linearGradient id="storage" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b7791f"/>
      <stop offset="1" stop-color="#7c4a03"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8fd3ff"/>
    </marker>
    <style>
      .title{font:700 34px "Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#f4fbff}
      .subtitle{font:400 17px "Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#a9c7d8}
      .lane-title{font:700 24px "Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#ffffff}
      .box-title{font:700 20px "Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#ffffff}
      .box-text{font:400 15px "Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#dceef7}
      .small{font:400 13px Consolas,"Microsoft YaHei",monospace;fill:#cfe7f3}
      .pill{font:700 13px Consolas,"Microsoft YaHei",monospace;fill:#07141f}
      .note{font:400 14px "Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#b9d3df}
      .panel{fill:rgba(255,255,255,0.055);stroke:rgba(255,255,255,0.16);stroke-width:1.5}
      .box{stroke:rgba(255,255,255,0.22);stroke-width:1.4;filter:url(#shadow)}
      .flow{fill:none;stroke:#8fd3ff;stroke-width:3;marker-end:url(#arrow)}
      .flow2{fill:none;stroke:#7dd3a8;stroke-width:3;marker-end:url(#arrow)}
      .flow3{fill:none;stroke:#ffd166;stroke-width:3;marker-end:url(#arrow)}
      .dash{stroke-dasharray:8 8}
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <circle cx="1320" cy="120" r="260" fill="#1f7a8c" opacity="0.08"/>
  <circle cx="210" cy="850" r="320" fill="#5a4fcf" opacity="0.08"/>

  <text x="80" y="78" class="title">基于 U-Net 模型的卫星图像水体识别系统架构图</text>
  <text x="82" y="111" class="subtitle">当前代码结构：Vue 3 + Vite 前端、Flask REST API、PyTorch U-Net/ResNet50 推理、PNG 结果蒙层文件服务</text>

  <rect x="70" y="155" width="400" height="710" rx="22" class="panel"/>
  <rect x="600" y="155" width="420" height="710" rx="22" class="panel"/>
  <rect x="1125" y="155" width="395" height="710" rx="22" class="panel"/>

  <text x="105" y="205" class="lane-title">浏览器 / 前端层</text>
  <text x="635" y="205" class="lane-title">Flask API / 服务层</text>
  <text x="1160" y="205" class="lane-title">模型与文件资源层</text>

  <rect x="105" y="245" width="330" height="105" rx="16" fill="url(#frontend)" class="box"/>
  <text x="130" y="283" class="box-title">App.vue</text>
  <text x="130" y="313" class="box-text">页面状态机：home / admin</text>
  <text x="130" y="338" class="small">src/App.vue</text>

  <rect x="105" y="385" width="330" height="128" rx="16" fill="url(#frontend)" class="box"/>
  <text x="130" y="423" class="box-title">图像上传组件</text>
  <text x="130" y="453" class="box-text">拖拽 / 选择 JPG、前端格式检查</text>
  <text x="130" y="478" class="small">ImageUploader.vue</text>
  <rect x="130" y="492" width="70" height="24" rx="12" fill="#d9f99d"/>
  <text x="145" y="509" class="pill">JPG</text>

  <rect x="105" y="550" width="330" height="150" rx="16" fill="url(#frontend)" class="box"/>
  <text x="130" y="588" class="box-title">结果可视化组件</text>
  <text x="130" y="618" class="box-text">原图与水体蒙层双窗口叠加显示</text>
  <text x="130" y="643" class="box-text">同步缩放、拖拽、统计指标展示</text>
  <text x="130" y="673" class="small">ResultViewer.vue + useSyncedPanZoom.ts</text>

  <rect x="105" y="735" width="330" height="88" rx="16" fill="url(#frontend)" class="box"/>
  <text x="130" y="773" class="box-title">后台管理页面</text>
  <text x="130" y="803" class="box-text">模型指标读取、权重文件上传</text>

  <rect x="635" y="245" width="350" height="118" rx="16" fill="url(#backend)" class="box"/>
  <text x="660" y="283" class="box-title">Flask 应用入口</text>
  <text x="660" y="313" class="box-text">注册 segmentation / results / model 蓝图</text>
  <text x="660" y="338" class="small">backend/app.py</text>

  <rect x="635" y="405" width="350" height="132" rx="16" fill="url(#backend)" class="box"/>
  <text x="660" y="443" class="box-title">分割接口</text>
  <text x="660" y="473" class="box-text">POST /api/segment</text>
  <text x="660" y="498" class="box-text">保存临时上传图，调用 segment()</text>
  <text x="660" y="523" class="small">routes/segmentation.py</text>

  <rect x="635" y="580" width="350" height="132" rx="16" fill="url(#backend)" class="box"/>
  <text x="660" y="618" class="box-title">模型管理接口</text>
  <text x="660" y="648" class="box-text">GET /api/metrics</text>
  <text x="660" y="673" class="box-text">POST /api/model/upload</text>
  <text x="660" y="698" class="small">routes/model.py</text>

  <rect x="635" y="748" width="350" height="84" rx="16" fill="url(#backend)" class="box"/>
  <text x="660" y="786" class="box-title">结果文件服务</text>
  <text x="660" y="816" class="box-text">GET /results/&lt;filename&gt; 返回 PNG 蒙层</text>

  <rect x="1160" y="245" width="325" height="126" rx="16" fill="url(#model)" class="box"/>
  <text x="1185" y="283" class="box-title">推理流水线</text>
  <text x="1185" y="313" class="box-text">RGB 转换、512x512 letterbox、归一化</text>
  <text x="1185" y="338" class="box-text">softmax 后裁剪回原图尺寸</text>
  <text x="1185" y="363" class="small">services/inference.py + preprocess.py</text>

  <rect x="1160" y="410" width="325" height="132" rx="16" fill="url(#model)" class="box"/>
  <text x="1185" y="448" class="box-title">U-Net 语义分割模型</text>
  <text x="1185" y="478" class="box-text">num_classes = 2，backbone = resnet50</text>
  <text x="1185" y="503" class="box-text">CUDA 可用时使用 GPU，否则 CPU</text>
  <text x="1185" y="528" class="small">models/nets/unet.py</text>

  <rect x="1160" y="580" width="325" height="110" rx="16" fill="url(#storage)" class="box"/>
  <text x="1185" y="618" class="box-title">模型权重</text>
  <text x="1185" y="648" class="box-text">best_epoch_weights.pth</text>
  <text x="1185" y="673" class="small">backend/saved_models/</text>

  <rect x="1160" y="728" width="325" height="104" rx="16" fill="url(#storage)" class="box"/>
  <text x="1185" y="766" class="box-title">上传与结果目录</text>
  <text x="1185" y="796" class="box-text">临时 JPG / 结果 PNG 蒙层</text>
  <text x="1185" y="821" class="small">backend/uploads/results/</text>

  <path d="M435 448 C515 448 545 470 635 470" class="flow"/>
  <text x="475" y="430" class="note">axios + FormData</text>
  <text x="505" y="454" class="small">POST /api/segment</text>

  <path d="M985 470 C1060 470 1085 308 1160 308" class="flow"/>
  <text x="1018" y="366" class="note">调用 segment()</text>

  <path d="M1322 371 L1322 410" class="flow2"/>
  <path d="M1322 542 L1322 580" class="flow3"/>
  <text x="1350" y="392" class="note">加载网络结构</text>
  <text x="1350" y="565" class="note">读取权重</text>

  <path d="M1160 780 C1085 780 1060 790 985 790" class="flow3"/>
  <path d="M635 790 C535 790 500 625 435 625" class="flow"/>
  <text x="1010" y="818" class="note">生成 RGBA 水体蒙层 PNG</text>
  <text x="455" y="664" class="small">GET /results/{filename}</text>

  <path d="M435 779 C515 779 545 646 635 646" class="flow2"/>
  <text x="458" y="735" class="small">GET /api/metrics</text>

  <path d="M435 805 C512 805 546 674 635 674" class="flow3 dash"/>
  <text x="458" y="833" class="small">POST /api/model/upload</text>

  <path d="M985 646 C1050 646 1090 635 1160 635" class="flow3 dash"/>
  <path d="M1160 635 C1084 635 1046 476 985 476" class="flow3 dash"/>
  <text x="1016" y="617" class="note">保存 .pth 并 reload_model()</text>

  <rect x="88" y="890" width="1428" height="50" rx="14" fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.12)"/>
  <text x="112" y="921" class="note">核心数据流：用户上传卫星 JPG → Flask 校验并临时保存 → PyTorch U-Net 预测水体像素 → 生成半透明蓝色 PNG 蒙层 → 前端叠加原图并展示水体覆盖率、像素数与总像素数。</text>
</svg>
